workflows:
  ios-release:
    name: iOS Release Build
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      xcode: latest
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.pricefoxy.app

    integrations:
      app_store_connect: codemagic

    scripts:
      - name: Set up code signing
        script: |
          xcode-project use-profiles

      - name: Build IPA
        script: |
          xcode-project build-ipa \
            --project "PriceFoxyApp.xcodeproj" \
            --scheme "PriceFoxyApp"

    artifacts:
      - build/ios/ipa/*.ipa

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
